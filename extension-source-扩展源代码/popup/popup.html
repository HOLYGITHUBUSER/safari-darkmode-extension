<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0}
body{width:280px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header h3{font-size:14px}
.status{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.on{background:#1a4a2a;color:#4ade80}
.off{background:#4a1a1a;color:#ef4444}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2a4a}
.row:last-child{border-bottom:none}
.label{font-size:12px;opacity:0.8}
.switch{position:relative;width:40px;height:20px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#444;transition:.3s;border-radius:20px}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}
input:checked+.slider{background:#4fc3f7}
input:checked+.slider:before{transform:translateX(20px)}
.themes{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0}
.theme{padding:6px;border:2px solid #2a2a4a;border-radius:8px;background:#1a1a2e;cursor:pointer;text-align:center;font-size:10px}
.theme.active{border-color:#4fc3f7;background:#16213e}
.theme-preview{width:100%;height:24px;border-radius:4px;margin-bottom:4px}
.slider-row{margin:8px 0}
.slider-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.slider-label span:last-child{color:#4fc3f7}
input[type=range]{width:100%;height:4px;border-radius:2px;background:#2a2a4a;outline:none;-webkit-appearance:none;appearance:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:#4fc3f7;cursor:pointer}
.footer{text-align:center;font-size:9px;opacity:0.3;margin-top:8px}
</style>
</head>
<body>
<div class="header">
<h3>Dark Mode</h3>
<span class="status off" id="status">OFF</span>
</div>
<div class="row">
<span class="label">Enable</span>
<label class="switch"><input type="checkbox" id="toggle"><span class="slider"></span></label>
</div>
<div class="themes">
<div class="theme active" data-theme="dark"><div class="theme-preview" style="background:#121212"></div>Dark</div>
<div class="theme" data-theme="sepia"><div class="theme-preview" style="background:#1c1510"></div>Sepia</div>
<div class="theme" data-theme="midnight"><div class="theme-preview" style="background:#0a0e1a"></div>Night</div>
<div class="theme" data-theme="forest"><div class="theme-preview" style="background:#0a1a0d"></div>Forest</div>
</div>
<div class="slider-row">
<div class="slider-label"><span>Brightness</span><span id="brightVal">100%</span></div>
<input type="range" id="bright" min="50" max="150" value="100">
</div>
<div class="slider-row">
<div class="slider-label"><span>Contrast</span><span id="contrastVal">100%</span></div>
<input type="range" id="contrast" min="50" max="150" value="100">
</div>
<div class="row">
<span class="label" id="siteLabel">Current Site</span>
<span class="status on" id="siteStatus">ON</span>
</div>
<div class="footer">v2.0 Safari Extension</div>
<script src="popup.js"></script>
</body>
</html>
