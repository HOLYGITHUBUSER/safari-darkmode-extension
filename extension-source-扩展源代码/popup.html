<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
    }

    /* 标签栏 */
    .tab-bar {
      display: flex;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      border: none;
      background: none;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      transition: .2s;
      text-align: center;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active {
      color: #4fc3f7;
      border-bottom: 2px solid #4fc3f7;
    }
    .tab-icon { display: block; font-size: 16px; margin-bottom: 2px; }

    /* 面板 */
    .tab-panel { display: none; padding: 14px 16px; }
    .tab-panel.active { display: block; }

    /* 头部 */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .panel-header h3 { font-size: 14px; font-weight: 600; }
    .status-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .status-on { background: #1a4a2a; color: #4ade80; }
    .status-off { background: #4a1a1a; color: #ef4444; }

    /* 开关 */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      transition: .3s;
      border-radius: 22px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #4fc3f7; }
    input:checked + .slider:before { transform: translateX(22px); }

    /* 主题网格 */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .theme-card {
      padding: 10px;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      background: #1a1a2e;
      cursor: pointer;
      text-align: center;
      transition: .2s;
    }
    .theme-card:hover { border-color: #4fc3f7; }
    .theme-card.active { border-color: #4fc3f7; background: #16213e; }
    .theme-preview {
      width: 100%;
      height: 40px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .theme-label { font-size: 11px; }

    /* 滑块 */
    .slider-group { margin-bottom: 12px; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .slider-label span:first-child { opacity: 0.7; }
    .slider-label span:last-child { color: #4fc3f7; font-weight: 600; }
    input[type="range"] {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #2a2a4a;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
    }

    /* 网站列表 */
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
      font-size: 12px;
    }
    .site-row:last-child { border-bottom: none; }
    .site-name { opacity: 0.8; }
    .site-toggle { cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .site-enabled { background: #1a4a2a; color: #4ade80; }
    .site-disabled { background: #4a1a1a; color: #ef4444; }

    /* 底部 */
    .footer {
      text-align: center;
      font-size: 10px;
      opacity: 0.3;
      padding: 8px;
      border-top: 1px solid #2a2a4a;
    }
  </style>
</head>
<body>

  <!-- 标签栏 -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="main">
      <span class="tab-icon">🌙</span>主控
    </button>
    <button class="tab-btn" data-tab="themes">
      <span class="tab-icon">🎨</span>主题
    </button>
    <button class="tab-btn" data-tab="adjust">
      <span class="tab-icon">🔆</span>调节
    </button>
    <button class="tab-btn" data-tab="sites">
      <span class="tab-icon">🌐</span>网站
    </button>
  </nav>

  <!-- 主控面板 -->
  <div class="tab-panel active" id="tab-main">
    <div class="panel-header">
      <h3>暗黑模式</h3>
      <span class="status-badge status-off" id="mainStatus">OFF</span>
    </div>
    <div class="panel-header">
      <span>启用暗黑模式</span>
      <label class="switch">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
      </label>
    </div>
    <div class="panel-header">
      <span>跟随系统主题</span>
      <label class="switch">
        <input type="checkbox" id="autoModeSwitch">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- 主题面板 -->
  <div class="tab-panel" id="tab-themes">
    <div class="panel-header">
      <h3>选择主题</h3>
    </div>
    <div class="theme-grid">
      <div class="theme-card active" data-theme="dark">
        <div class="theme-preview" style="background:#121212;border:1px solid #333;"></div>
        <div class="theme-label">🌑 暗夜</div>
      </div>
      <div class="theme-card" data-theme="sepia">
        <div class="theme-preview" style="background:#1c1510;border:1px solid #4a3c22;"></div>
        <div class="theme-label">📜  sepia</div>
      </div>
      <div class="theme-card" data-theme="midnight">
        <div class="theme-preview" style="background:#0a0e1a;border:1px solid #1e2d45;"></div>
        <div class="theme-label">🌌 午夜</div>
      </div>
      <div class="theme-card" data-theme="forest">
        <div class="theme-preview" style="background:#0a1a0d;border:1px solid #1a3320;"></div>
        <div class="theme-label">🌿 森林</div>
      </div>
    </div>
  </div>

  <!-- 调节面板 -->
  <div class="tab-panel" id="tab-adjust">
    <div class="panel-header">
      <h3>显示调节</h3>
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>亮度</span>
        <span id="brightnessVal">100%</span>
      </div>
      <input type="range" id="brightnessSlider" min="50" max="150" value="100">
    </div>
    <div class="slider-group">
      <div class="slider-label">
        <span>对比度</span>
        <span id="contrastVal">100%</span>
      </div>
      <input type="range" id="contrastSlider" min="50" max="150" value="100">
    </div>
  </div>

  <!-- 网站面板 -->
  <div class="tab-panel" id="tab-sites">
    <div class="panel-header">
      <h3>网站管理</h3>
    </div>
    <div id="sitesList">
      <div class="site-row">
        <span class="site-name">当前网站</span>
        <span class="site-toggle site-enabled" id="currentSiteToggle">启用</span>
      </div>
    </div>
  </div>

  <div class="footer">Safari 暗黑模式 v2.0</div>

  <script src="popup.js"></script>
</body>
</html>
