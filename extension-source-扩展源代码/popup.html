<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
      color: #ffffff;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      opacity: 0.8;
    }
    .section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label {
      font-size: 14px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #555;
      transition: .3s;
      border-radius: 26px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #64b5f6;
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .slider-container {
      margin-top: 12px;
    }
    .slider-label {
      font-size: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.3);
      outline: none;
      -webkit-appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #64b5f6;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🌙 暗黑模式</h2>
    <p>智能护眼，舒适阅读</p>
  </div>
  
  <div class="section">
    <div class="section-title">基本设置</div>
    <div class="toggle-container">
      <span class="toggle-label">启用暗黑模式</span>
      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">强度调节</div>
    <div class="slider-container">
      <div class="slider-label">
        <span>反转强度</span>
        <span id="intensityValue">90%</span>
      </div>
      <input type="range" id="intensitySlider" min="50" max="100" value="90">
    </div>
  </div>
  
  <div class="footer">
    自动适配所有网页
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
