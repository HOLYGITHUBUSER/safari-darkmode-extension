<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <!-- 月亮渐变 -->
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 星星渐变 -->
    <radialGradient id="starGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:0.8" />
    </radialGradient>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 外发光 -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="56" fill="url(#bgGradient)" stroke="#4a90e2" stroke-width="3"/>
  
  <!-- 装饰性光环 -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="#4a90e2" stroke-width="1" opacity="0.5"/>
  <circle cx="64" cy="64" r="44" fill="none" stroke="#6dd5ed" stroke-width="1" opacity="0.3"/>
  
  <!-- 月亮主体 -->
  <path d="M50 35 
           Q 75 35, 75 60
           Q 75 85, 50 85
           Q 60 80, 60 60
           Q 60 40, 50 35" 
        fill="url(#moonGradient)" 
        filter="url(#glow)"
        transform="translate(8, 0)"/>
  
  <!-- 月亮表面的陨石坑细节 -->
  <circle cx="58" cy="48" r="4" fill="#cc7000" opacity="0.6"/>
  <circle cx="65" cy="58" r="3" fill="#cc7000" opacity="0.5"/>
  <circle cx="60" cy="70" r="3.5" fill="#cc7000" opacity="0.5"/>
  
  <!-- 星星 1 -->
  <g filter="url(#glow)">
    <polygon points="85,30 87,35 92,35 88,38 90,43 85,40 80,43 82,38 78,35 83,35" fill="url(#starGradient)"/>
  </g>
  
  <!-- 星星 2 -->
  <g filter="url(#glow)">
    <polygon points="95,55 96,58 99,58 97,60 98,63 95,61 92,63 93,60 91,58 94,58" fill="url(#starGradient)"/>
  </g>
  
  <!-- 星星 3 -->
  <g filter="url(#glow)">
    <polygon points="30,45 31,48 34,48 32,50 33,53 30,51 27,53 28,50 26,48 29,48" fill="url(#starGradient)"/>
  </g>
  
  <!-- 星星 4 -->
  <g filter="url(#glow)">
    <polygon points="35,75 36,78 39,78 37,80 38,83 35,81 32,83 33,80 31,78 34,78" fill="url(#starGradient)"/>
  </g>
  
  <!-- 小星星点缀 -->
  <circle cx="45" cy="30" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="100" cy="70" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="25" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="90" cy="90" r="1.5" fill="#ffffff" opacity="0.6"/>
  
  <!-- 底部文字 DM -->
  <text x="64" y="108" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="bold" 
        fill="#4a90e2" 
        text-anchor="middle"
        filter="url(#glow)">DM</text>
</svg>
