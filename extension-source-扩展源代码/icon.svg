<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2d3a66"/>
      <stop offset="60%" stop-color="#1a2040"/>
      <stop offset="100%" stop-color="#0b0f1f"/>
    </radialGradient>
    <mask id="crescent">
      <rect width="128" height="128" fill="black"/>
      <circle cx="64" cy="64" r="34" fill="white"/>
      <circle cx="80" cy="54" r="30" fill="black"/>
    </mask>
  </defs>

  <!-- 圆形底 -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- 细边圈 -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#3b4a7a" stroke-width="1.5" opacity="0.7"/>

  <!-- 月牙（纯色，高可辨识） -->
  <rect width="128" height="128" fill="#f5f0dc" mask="url(#crescent)"/>

  <!-- 少量星点，简洁 -->
  <circle cx="30"  cy="40" r="1.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="38"  cy="88" r="1.4" fill="#ffffff" opacity="0.75"/>
  <circle cx="96"  cy="92" r="1.6" fill="#ffffff" opacity="0.85"/>
  <circle cx="100" cy="36" r="1.3" fill="#ffffff" opacity="0.7"/>
</svg>
